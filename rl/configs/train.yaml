# train.yaml
# Default training composition: POMO (Policy Optimization with Multiple Optima)
#
# For other training modes, use:
#   train_meta.yaml   - MAML with curriculum learning and fine-tuning

device: cpu

reproducibility:
  seed:
    random_seed: 42
    numpy_seed: 42
    torch_seed: 42

experiment:
  name: "101"
  description: initial experiment

logger:
  base_dir: experiment/train
  verbose: true
  tensorboard: false

_include:
  - trainer: trainer/pomo.yaml
  - network: network/geman.yaml
  - environment: environment/vrpbtw.yaml


