# trainer/pomo.yaml
# POMOTrainer: Policy Optimization with Multiple Optima
#
# POMOTrainer trains a separate sub-policy for each task independently.
# Each task gets its own policy optimization loop with POMO collection
# (multiple starting points per instance) and gradient updates.

trainer:
  name: pomo

  collector:
    name: pomo
    params: {}

  agents:
    train_agent:
      name: pomo
      learning_rate: 0.001
      optimizer: adam
      entropy_coef: 0.1
      max_grad_norm: 0.5
    eval_agent:
      name: pomo
      learning_rate: 0.001
      optimizer: adam
      entropy_coef: 0.1
      max_grad_norm: 0.5

  evaluators:
    train_eval:
      agent: eval_agent
      n_episodes: 100
      deterministic: true
      decoding:
        beam_width: 1

  phases:
    training:
      control:
        epochs: 100
        batches_per_epoch: 10
        instances_per_batch: 5
        eval_interval: 1
        checkpoint_interval: 10
