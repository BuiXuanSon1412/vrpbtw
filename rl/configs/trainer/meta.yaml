# trainer/meta.yaml
# MAML (Model-Agnostic Meta-Learning) training configuration
#
# MAML trains policies that adapt quickly to new task distributions:
# - Maintains a task pool with multiple problem sizes and distributions
# - Inner loop: fast gradient steps on support set (K_inner iterations)
# - Outer loop: meta-gradient update on query set
# - Curriculum learning: gradually expand task difficulty during training

trainer:
  name: meta

  collector:
    name: gae
    params:
      rollout_length: 256
      gamma: 0.99
      gae_lambda: 0.95

  agents:
    meta_agent:
      name: ppo
      learning_rate: 0.001
      optimizer: unspecified
      clip_eps: 0.2
      value_coef: 0.5
      entropy_coef: 0.01
      max_grad_norm: 0.5
    sub_agent:
      name: ppo
      learning_rate: 0.001
      optimizer: adam
      clip_eps: 0.2
      value_coef: 0.5
      entropy_coef: 0.01
      max_grad_norm: 0.5
    tune_agent:
      name: ppo
      learning_rate: 0.001
      optimizer: adam
      clip_eps: 0.2
      value_coef: 0.5
      entropy_coef: 0.01
      max_grad_norm: 0.5
    eval_agent:
      name: ppo
      learning_rate: 0.001
      optimizer: adam
      clip_eps: 0.2
      value_coef: 0.5
      entropy_coef: 0.01
      max_grad_norm: 0.5

  evaluators:
    meta_eval:
      agent: meta_agent
      n_episodes: 20
      deterministic: true
      decoding:
        beam_width: 1
    tune_eval:
      agent: tune_agent
      n_episodes: 100
      deterministic: true
      decoding:
        beam_width: 1 

  phases:
    meta_learning:
      curriculum:
        entropy_threshold: 0.5
        check_interval: 1
      control:
        epochs: 200
        batches_per_epoch: 50
        eval_interval: 1
        checkpoint_interval: 10
      early_stopping:
        patience: 20
        min_delta: 0.0001

    fine_tuning:
      control:
        epochs: 50
        batches_per_epoch: 100
        ppo_epochs: 3
        eval_interval: 1
        checkpoint_interval: 10
      early_stopping:
        patience: 10
        min_delta: 0.0001
