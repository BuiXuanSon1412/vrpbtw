# =============================================================================
# configs/maml_base.yaml  —  FOMAML meta-training (CPU-feasible sizes)
# =============================================================================
#
# Tasks: n ∈ {10, 20, 50, 100}  ← CPU-feasible subset
# The HGNN has O(N²) attention complexity.  Sizes 200/400/1000 require GPU.
# For full task distribution [10,20,50,100,200,400,1000] use --device cuda.
#
# Algorithm: First-Order MAML (FOMAML)
#   Inner loop: 1 SGD step on support rollout (per task)
#   Outer loop: Adam update using averaged query gradients across tasks
#   Gradients accumulated per transition (constant O(N²) memory per step).
#
# Budget accounting (per meta-update):
#   4 tasks × (256 support + 256 query) = 2 048 env steps
#   ~500 meta-updates ≈ 1 M steps total
#
# Evaluation anchor during training: n=50 (median of CPU task sizes).
# Full cross-size evaluation after training: use evaluate.py --customers N.
#
# Usage:
#   python train.py --config configs/maml_base.yaml            # CPU, small sizes
#   python train.py --config configs/maml_base.yaml \
#     --device cuda \
#     --override configs/maml_full.yaml                        # GPU, all 7 sizes
#   python train.py --config configs/maml_base.yaml --device cuda --name maml_run1
# =============================================================================

name:      vrpbtw_maml_base
algorithm: maml
device:    cpu

seed:
  global_seed: 42
  env_seed:    null
  data_seed:   null

env:
  problem_name: vrpbtw
  problem_kwargs:
    coord_distribution:    RC
    linehaul_ratio:        0.5
    generator_seed_offset: 100000
  max_steps:    null
  reward_scale: 1.0

network:
  network_type:      hgnn
  embed_dim:         128
  n_heads:           4
  n_encoder_layers:  3
  dropout:           0.1
  clip_logits:       10.0
  ortho_init:        true
  use_instance_norm: true

maml:
  # Outer loop (Adam) — same order of magnitude as PPO base lr
  meta_lr:             0.0003

  # Inner loop (SGD) — ~33× meta_lr; fast local adaptation per task
  inner_lr:            0.01

  # FOMAML standard: 1 inner step avoids second-order gradient computation
  n_inner_steps:       1

  # All CPU-feasible sizes in a single meta-update
  n_tasks_per_update:  4

  # Steps collected per task per meta-update
  support_rollout_len: 256    # inner-loop data
  query_rollout_len:   256    # outer-loop data (meta-gradient signal)

  # Task distribution — CPU-feasible subset.
  # Add 200/400/1000 only with --device cuda.
  task_sizes: [10, 20, 50, 100]

  # Shared RL hyperparameters
  gamma:               0.99
  gae_lambda:          0.95
  value_coef:          0.5
  entropy_coef:        0.02   # keep exploration — identical to PPO base
  max_grad_norm:       0.5
  normalize_advantages: true
  normalize_rewards:    true

train:
  # 1 000 meta-updates × 3 584 steps/update ≈ 3.58 M steps
  # Matches 1 000 PPO gradient updates at rollout_len=1 024 × n_epochs=4
  total_timesteps:     3600000

  log_interval:        5
  eval_interval:       20
  checkpoint_interval: 100
  checkpoint_dir:      checkpoints
  log_dir:             logs

  # Larger patience: meta-loss is noisier than single-task PPO
  patience:            150
  min_delta:           0.0001

  n_eval_episodes:     20
  eval_deterministic:  true
  eval_beam_width:     1

  # MAML handles multi-scale learning implicitly via task sampling
  curriculum: false
